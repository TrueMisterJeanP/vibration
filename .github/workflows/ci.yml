name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: go vet -tags community ./...
      - run: GOCACHE=/tmp/webtchat-go-cache go test -tags community ./...
      - run: go build -tags community ./cmd/server
      - run: npm run check:js
